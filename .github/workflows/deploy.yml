name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:
    # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: |
            client/package-lock.json

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Install dev dependencies
        working-directory: ./client
        run: npm install --save-dev tailwindcss postcss autoprefixer @types/node

      - name: Build client
        working-directory: ./client
        run: npm run build:vercel
        env:
          VITE_API_URL: https://barberbooker.onrender.com

      - name: Copy build files
        run: |
          mkdir -p dist
          cp -r client/dist/* dist/

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: vercel deploy --prod --token="ce7Vsibo0OvcLLiuhbCs4Elt" --yes
